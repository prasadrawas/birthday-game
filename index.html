<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Run to Midnight Kiss</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 900px;
      max-height: 506px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      image-rendering: auto;
    }
    #controls {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 20px;
      z-index: 10;
    }
    #controls button {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 24px;
      font-weight: bold;
      backdrop-filter: blur(4px);
      cursor: pointer;
      transition: background 0.1s;
    }
    #controls button:active {
      background: rgba(255,255,255,0.35);
    }
    @media (pointer: coarse) {
      #controls { display: flex; }
    }
    @media (max-width: 600px) {
      #gameContainer { max-width: 100vw; max-height: 100vh; }
      canvas { border-radius: 0; }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="900" height="506"></canvas>
    <div id="controls">
      <button id="btnJump">&#8593;</button>
      <button id="btnSlide">&#8595;</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
